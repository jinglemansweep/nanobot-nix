name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:
    inputs:
      nanobot_ref:
        description: "Nanobot git ref to build"
        required: false
        default: "main"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jinglemansweep/nanobot-nix
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD'}},enable=${{ github.event_name == 'schedule' }}

      - name: Build image for testing
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: nanobot-nix:smoke-test
          build-args: |
            NANOBOT_REPO=https://github.com/HKUDS/nanobot.git
            NANOBOT_REF=${{ github.event.inputs.nanobot_ref || 'main' }}

      - name: Smoke test
        run: docker run --rm nanobot-nix:smoke-test status

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NANOBOT_REPO=https://github.com/HKUDS/nanobot.git
            NANOBOT_REF=${{ github.event.inputs.nanobot_ref || 'main' }}
