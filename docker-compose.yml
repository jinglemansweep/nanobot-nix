x-common-build: &common-build
  context: .
  dockerfile: Dockerfile
  args:
    NANOBOT_REPO: https://github.com/HKUDS/nanobot.git
    NANOBOT_REF: main

services:

  gateway:
    image: ghcr.io/jinglemansweep/nanobot-nix:latest
    build: *common-build
    command: ["gateway"]
    restart: unless-stopped
    ports:
      - "${DOCKER_BIND_HOST:-127.0.0.1}:18790:18790"
    env_file:
      - ${PWD}/.env
    tmpfs:
      - /tmp
    volumes:
      - ${DOCKER_BOT_PATH}:/root/.nanobot
      - nix-store:/nix
      - ./skills:/mnt/skills:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18790"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  api:
    image: ghcr.io/jinglemansweep/nanobot-nix:latest
    build: *common-build
    command: ["serve", "--host", "0.0.0.0", "-w", "/home/nanobot/.nanobot/api-workspace"]
    restart: unless-stopped
    env_file:
      - ${PWD}/.env
    ports:
      - "${DOCKER_BIND_HOST:-127.0.0.1}:8900:8900"
    tmpfs:
      - /tmp
    volumes:
      - ${DOCKER_BOT_PATH}:/root/.nanobot
      - nix-store:/nix
      - ./skills:/mnt/skills:ro
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M


  cli:
    image: ghcr.io/jinglemansweep/nanobot-nix:latest
    build: *common-build
    command: ["agent"]
    stdin_open: true
    tty: true
    profiles:
      - cli
    env_file:
      - ${PWD}/.env
    tmpfs:
      - /tmp
    volumes:
      - ${DOCKER_BOT_PATH}:/root/.nanobot
      - nix-store:/nix
      - ./skills:/mnt/skills:ro

volumes:
  nix-store:
